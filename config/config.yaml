# config/config.yaml
project_name: "QualiTrace"

# Toggle this based on where you are running
environment: "kaggle"

paths:
  kaggle:
    data_dir: "/kaggle/input/datasets/ipythonx/mvtec-ad"
    output_dir: "/kaggle/working/models"
    log_dir: "https://dagshub.com/H4TT1/quali-trace.mlflow"
  local:
    data_dir: "./data/raw"
    output_dir: "./models"
    log_dir: "./mlruns"

data:
  name: "mvtec-ad"
  version: "kaggle-ipythonx-default"
  source: "kaggle://ipythonx/mvtec-ad"

data_validation:
  enabled: true
  fail_on_error: true
  expected_channels: 3
  min_train_test_ratio: 0.1
  max_train_test_ratio: 10.0

# Generic model selector
model:
  # family options: embedding, vlm
  family: "embedding"

  # architecture options per family:
  # embedding -> patchcore
  # vlm -> clip
  architecture: "patchcore"

  # PatchCore options
  backbone: "wide_resnet50_2"
  pretrained: true
  layers: ["layer2", "layer3"]
  max_memory_patches: 20000
  distance_chunk_size: 4096

  # VLM-only options
  vlm_backbone: "openai/clip-vit-base-patch32"

train_params:
  batch_size: 32
  img_size: 256

evaluation:
  auroc_threshold: 0.85
  register_on_pass: true
  model_registry_name: "QualiTrace-PatchCore"
  candidate_tag: "Candidate"

experiment:
  category: "bottle"

vlm_params:
  normal_prompt: "a photo of a normal {category}"
  anomaly_prompt: "a photo of a defective {category}"
  # Optional override. If omitted, auto picks cuda when available.
  # device: "cuda"
