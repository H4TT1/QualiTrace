project_name: "QualiTrace"
environment: "local"

paths:
  local:
    data_dir: ".ci_data/mvtec"
    output_dir: ".ci_outputs/models"
    log_dir: ".ci_outputs/mlruns"

data:
  name: "mvtec-ad-smoke"
  version: "ci-synthetic"
  source: "generated-in-github-actions"

data_validation:
  enabled: true
  fail_on_error: true
  expected_channels: 3
  min_train_test_ratio: 0.1
  max_train_test_ratio: 10.0

model:
  family: "embedding"
  architecture: "patchcore"
  backbone: "resnet18"
  pretrained: false
  layers: ["layer2", "layer3"]
  max_memory_patches: 128
  distance_chunk_size: 256

train_params:
  batch_size: 1
  img_size: 32

evaluation:
  auroc_threshold: 0.85
  register_on_pass: false
  model_registry_name: "QualiTrace-PatchCore"
  candidate_tag: "Candidate"

experiment:
  category: "bottle"

vlm_params:
  normal_prompt: "a photo of a normal {category}"
  anomaly_prompt: "a photo of a defective {category}"
