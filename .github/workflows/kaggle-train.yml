name: Kaggle GPU Training

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      kernel_slug:
        description: "Kaggle kernel slug"
        required: false
        default: "qualitrace-training"

permissions:
  contents: read

jobs:
  kaggle-train:
    name: Submit Kaggle GPU job
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: |
          python -m pip install --upgrade pip
          pip install "kaggle>=1.8.0"

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo $KAGGLE_KEY > ~/.kaggle/access_token && chmod 600 ~/.kaggle/access_token

      - name: Package repo as Kaggle dataset
        run: |
          mkdir -p kaggle_source
          git archive --format zip --output kaggle_source/qualitrace_source.zip HEAD
          cat > kaggle_source/dataset-metadata.json <<EOF
          {
            "title": "QualiTrace Source",
            "id": "${{ secrets.KAGGLE_USERNAME }}/qualitrace-source",
            "licenses": [
              {
                "name": "CC0-1.0"
              }
            ]
          }
          EOF

      - name: Publish source dataset
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: |
          if kaggle datasets status "$KAGGLE_USERNAME/qualitrace-source" >/dev/null 2>&1; then
            echo "Dataset exists, creating new version..."
            kaggle datasets version \
              -p kaggle_source \
              -m "Update source from GitHub Actions"
          else
            echo "Dataset does not exist, creating..."
            kaggle datasets create \
              -p kaggle_source
          fi

      - name: Prepare Kaggle kernel metadata
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KERNEL_SLUG: ${{ github.event.inputs.kernel_slug || 'qualitrace-training' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("kaggle_pipeline/kernel-metadata.json")
          metadata = json.loads(path.read_text())
          username = os.environ["KAGGLE_USERNAME"]
          slug = os.environ["KERNEL_SLUG"]
          metadata["id"] = f"{username}/{slug}"
          metadata["dataset_sources"] = [
              "ipythonx/mvtec-ad",
              f"{username}/qualitrace-source",
          ]
          path.write_text(json.dumps(metadata, indent=2))
          PY

      - name: Submit Kaggle GPU kernel
        run: kaggle kernels push -p kaggle_pipeline

      - name: Follow Kaggle logs
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KERNEL_SLUG: ${{ github.event.inputs.kernel_slug || 'qualitrace-training' }}
        run: kaggle kernels logs "$KAGGLE_USERNAME/$KERNEL_SLUG" --follow --interval 30

      - name: Download Kaggle outputs
        if: always()
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KERNEL_SLUG: ${{ github.event.inputs.kernel_slug || 'qualitrace-training' }}
        run: |
          mkdir -p kaggle_outputs
          kaggle kernels output "$KAGGLE_USERNAME/$KERNEL_SLUG" -p kaggle_outputs || true

      - name: Upload Kaggle outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-training-outputs
          path: kaggle_outputs